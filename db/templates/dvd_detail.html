<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ dvd.dvd_id }}</title>
    <style>
        :root { --bg: #0a0a0a; --card: #161616; --accent: #0288d1; --text: #d1d1d1; --yellow: #ffc107; --border: #333; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        
        .header-section { max-width: 1100px; margin: 0 auto 30px; background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); display: flex; align-items: center; gap: 20px; }
        .search-form { flex: 1; display: flex; gap: 10px; align-items: center; }
        input[type="text"] { flex: 1; background: #000; border: 1px solid var(--border); padding: 12px; border-radius: 6px; color: #fff; outline: none; }
        
        .btn { padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; border: none; text-decoration: none; font-size: 14px; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; }
        .btn-search { background: var(--accent); color: #fff; }
        .btn-reset { background: #333; color: #aaa; }

        .container { max-width: 1100px; margin: 0 auto; display: flex; gap: 50px; background: var(--card); padding: 40px; border-radius: 20px; border: 1px solid #222; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .img-box { width: 450px; flex-shrink: 0; border-radius: 10px; overflow: hidden; border: 1px solid #333; background: #222; aspect-ratio: 18/26; display: flex; align-items: center; justify-content: center; position: relative; }
        
        .img-box img { width: 100%; height: 100%; object-fit: cover; object-position: right center; }
        
        .no-image-text { display: none; color: #444; font-weight: bold; font-size: 30px; letter-spacing: 3px; }
        .img-error img { display: none; }
        .img-error .no-image-text { display: block; }

        .info { flex: 1; }
        h1 { color: var(--yellow); font-size: 36px; margin: 0 0 10px 0; border-bottom: 2px solid #222; padding-bottom: 15px; }
        .title-long { font-size: 1.1em; color: #eee; margin-bottom: 30px; line-height: 1.5; }
        
        .external-links { display: flex; gap: 10px; margin-bottom: 30px; }
        .btn-ext { padding: 8px 15px; border-radius: 4px; font-size: 13px; font-weight: bold; text-decoration: none; transition: 0.2s; }
        .btn-topgirl { background: #e91e63; color: #fff; }
        .btn-123av { background: #673ab7; color: #fff; }
        .btn-ext:hover { opacity: 0.8; transform: translateY(-2px); }

        .meta { display: grid; grid-template-columns: 100px 1fr; gap: 15px; margin-bottom: 40px; }
        .meta label { color: #555; font-weight: bold; text-transform: uppercase; font-size: 13px; }
        .meta span { color: #aaa; }
        
        .actor-list { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .actor-btn { padding: 10px 20px; background: #222; color: #4fc3f7; text-decoration: none; border: 1px solid #333; border-radius: 30px; transition: 0.3s; }
        .actor-btn:hover { background: var(--accent); color: #fff; }
        
        .memo-box { margin-top: 40px; padding-top: 30px; border-top: 1px solid #222; }
        textarea { width: 100%; background: #0a0a0a; border: 1px solid #333; border-radius: 8px; color: #ccc; padding: 15px; resize: none; outline: none; font-family: inherit; }
        .save-btn { margin-top: 10px; float: right; background: #333; color: #fff; border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .save-btn:hover { background: var(--accent); }
    </style>
</head>
<body>
    <div class="header-section">
        <form class="search-form" action="/">
            <input type="text" name="search" value="">
            <button type="submit" class="btn btn-search">Search</button>
            <a href="/" class="btn btn-reset">Home</a>
        </form>
    </div>

    <div class="container">
        <div class="img-box">
            <img src="/images/covers/{{ dvd.dvd_id }}" 
                 onerror="if(!this.getAttribute('data-tried-ext')){ 
                            this.setAttribute('data-tried-ext', '1');
                            {% if dvd.code %}
                            /* 폴더명은 소문자로(.lower()), 파일명은 대소문자 유지 */
                            this.src='https://c0.jdbstatic.com/covers/{{ dvd.code[:2].lower() }}/{{ dvd.code }}.jpg';
                            {% else %}
                            this.parentElement.classList.add('img-error');
                            {% endif %}
                          } else { 
                            this.parentElement.classList.add('img-error'); 
                          }">
            <div class="no-image-text">NO IMAGE</div>
        </div>
        <div class="info">
            <h1>{{ dvd.dvd_id }}</h1>
            <div class="title-long">{{ dvd.title }}</div>

            <div class="external-links">
                <a href="https://kr40.topgirl.co/video/search?keyword={{ dvd.dvd_id }}" target="_blank" class="btn-ext btn-topgirl">Topgirl</a>
                <a href="https://1av.to/ko/search?keyword={{ dvd.dvd_id }}" target="_blank" class="btn-ext btn-123av">123Av</a>
            </div>

            <div class="meta">
                <label>Release</label><span>{{ dvd.release_date or '' }}</span>
                <label>Subtitle</label><span>{{ 'Yes' if (dvd.subtitle and dvd.subtitle != '0') else 'No' }}</span>
            </div>
            
            <div style="color: #555; font-size: 13px; font-weight: bold; text-transform: uppercase; margin-bottom: 15px;">Cast</div>
            <div class="actor-list">
                {% for a in actors %}
                <a href="/actor/{{ a.id }}" class="actor-btn"># {{ a.name_ko }}{% if a.hair and a.hair|int > 0 %} ❤️{% endif %}</a>
                {% endfor %}
            </div>

            <div class="memo-box">
                <div style="color: #555; font-size: 13px; font-weight: bold; text-transform: uppercase; margin-bottom: 15px;">Memo</div>
                <textarea id="dvdNote" rows="4">{{ dvd.note or '' }}</textarea>
                <button class="save-btn" onclick="saveNote({{ dvd.id }})">Save</button>
            </div>
        </div>
    </div>

    <script>
        function saveNote(id) {
            const note = document.getElementById('dvdNote').value;
            fetch('/update_dvd', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id: id, note: note})
            });
        }
    </script>
</body>
</html>
